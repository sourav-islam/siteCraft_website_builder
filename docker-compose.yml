version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sitecraft_db
    environment:
      POSTGRES_DB: sitecraft_db
      POSTGRES_USER: sitecraft_user
      POSTGRES_PASSWORD: sitecraft_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sitecraft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data: