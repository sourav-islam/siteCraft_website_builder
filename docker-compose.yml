version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sitecraft_db
    environment:
      POSTGRES_DB: sitecraft_db
      POSTGRES_USER: sitecraft_user
      POSTGRES_PASSWORD: sitecraft_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
